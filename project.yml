name: AstroPotatoLA
options:
  bundleIdPrefix: com.astropotatola
  minimumXcodeGenVersion: 2.39.0

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    version: 0.30.6
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    version: 2.30.6

targets:
  AstroPotatoLA:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [Sources/AstroPotatoLA]
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGN_ENTITLEMENTS: ""
      CODE_SIGNING_ALLOWED: "NO"
      ENABLE_BITCODE: "NO"
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-lm
        product: MLXLLM
